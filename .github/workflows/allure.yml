name: Allure Report

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  allure:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run Tests
        # Теперь билд упадет (будет красный), если хоть один тест не прошел
        run: mvn clean test "-DsuiteXmlFile=testng-crossbrowser.xml"

      - name: Get Allure history
        uses: actions/checkout@v3
        if: always() # Это важно: выполняем, даже если тесты упали
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Allure Report action from GH
        uses: simple-elf/allure-report-action@master
        if: always() # Собираем отчет в любом случае
        with:
          allure_results: target/allure-results
          allure_history: allure-history
          keep_reports: 20

      - name: Deploy report to Github Pages
        if: always() # Публикуем ссылку в любом случае
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history